<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tinku — AI Agent</title>
<link rel="manifest" href="/static/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Clash+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #161624;
  --surface3: #1e1e30;
  --border: #252538;
  --border2: #2e2e48;
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,0.25);
  --green: #10b981;
  --red: #f43f5e;
  --amber: #f59e0b;
  --blue: #3b82f6;
  --text: #f0f0ff;
  --text2: #9090b8;
  --text3: #50506a;
  --font: 'Clash Display', sans-serif;
  --mono: 'DM Mono', monospace;
  --r: 14px;
  --r2: 20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; overflow: hidden; }

body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════ */
#authScreen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  z-index: 1000;
  padding-bottom: env(safe-area-inset-bottom);
}

.auth-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99,102,241,0.3), transparent),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(16,185,129,0.15), transparent);
}

.auth-hero {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 60%;
  gap: 16px;
}

.auth-orb {
  width: 88px; height: 88px;
  background: conic-gradient(from 180deg, var(--accent), var(--green), var(--blue), var(--accent));
  border-radius: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  animation: orb-float 3s ease-in-out infinite, orb-hue 8s linear infinite;
  box-shadow: 0 0 80px var(--accent-glow);
}

@keyframes orb-float {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-10px) rotate(2deg); }
}
@keyframes orb-hue { to { filter: hue-rotate(360deg); } }

.auth-title {
  font-size: 48px; font-weight: 700;
  letter-spacing: -2px;
  background: linear-gradient(135deg, #fff 0%, var(--text2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.auth-tagline {
  font-family: var(--mono);
  font-size: 13px; color: var(--text3);
  letter-spacing: 2px; text-transform: uppercase;
}

.auth-sheet {
  position: relative;
  width: 100%; max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 28px 28px 0 0;
  padding: 32px 24px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom));
  display: flex; flex-direction: column; gap: 12px;
}

.auth-sheet::before {
  content: '';
  display: block;
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 0 auto 20px;
}

.btn-google {
  width: 100%; padding: 16px;
  background: white; border: none;
  border-radius: var(--r2);
  font-family: var(--font); font-size: 16px; font-weight: 600;
  color: #111;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-google:hover { background: #f5f5f5; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }

.btn-email {
  width: 100%; padding: 16px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--r2);
  font-family: var(--font); font-size: 16px; font-weight: 600;
  color: var(--text);
  cursor: pointer; transition: all 0.2s;
}
.btn-email:hover { background: var(--surface3); border-color: var(--accent); }

.btn-guest {
  width: 100%; padding: 12px;
  background: none; border: none;
  font-family: var(--mono); font-size: 13px;
  color: var(--text3);
  cursor: pointer; transition: color 0.2s;
}
.btn-guest:hover { color: var(--text2); }

.divider {
  display: flex; align-items: center; gap: 12px;
  font-family: var(--mono); font-size: 12px; color: var(--text3);
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ═══════════════════════════════════════
   EMAIL AUTH FORM
═══════════════════════════════════════ */
#emailScreen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1001; padding: 24px;
}

.email-card {
  width: 100%; max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 32px 24px;
}

.email-card h2 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.email-card p { font-family: var(--mono); font-size: 13px; color: var(--text3); margin-bottom: 24px; }

.inp {
  width: 100%; padding: 14px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text); font-family: var(--font); font-size: 15px;
  outline: none; transition: border-color 0.2s;
  margin-bottom: 12px;
}
.inp:focus { border-color: var(--accent); }
.inp::placeholder { color: var(--text3); }

.btn-primary {
  width: 100%; padding: 14px;
  background: var(--accent); border: none;
  border-radius: var(--r);
  font-family: var(--font); font-size: 16px; font-weight: 600; color: white;
  cursor: pointer; transition: all 0.2s; margin-top: 4px;
}
.btn-primary:hover { background: #5558e8; transform: translateY(-1px); }

.auth-toggle {
  text-align: center; margin-top: 20px;
  font-family: var(--mono); font-size: 13px; color: var(--text3);
}
.auth-toggle span { color: var(--accent); cursor: pointer; }
.auth-toggle span:hover { text-decoration: underline; }

.back-btn {
  background: none; border: none; color: var(--text3);
  font-family: var(--mono); font-size: 13px;
  cursor: pointer; margin-bottom: 20px; display: flex; align-items: center; gap: 6px;
}
.back-btn:hover { color: var(--text2); }

/* ═══════════════════════════════════════
   MAIN APP
═══════════════════════════════════════ */
#appScreen {
  display: none;
  height: 100%;
  flex-direction: column;
}

/* TOP BAR */
.topbar {
  height: 56px; flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 10px;
  padding-top: env(safe-area-inset-top);
}

.menu-btn, .icon-btn2 {
  width: 36px; height: 36px;
  border-radius: 10px; border: none;
  background: transparent; color: var(--text2);
  cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.menu-btn:hover, .icon-btn2:hover { background: var(--surface2); color: var(--text); }

.topbar-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }
.topbar-name { font-size: 16px; font-weight: 600; }

.provider-badge {
  padding: 3px 8px; border-radius: 20px;
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text2);
}

.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  object-fit: cover; cursor: pointer;
  border: 2px solid var(--border2);
  flex-shrink: 0;
}

/* SIDEBAR */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: 300px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 200;
  display: flex; flex-direction: column;
  transform: translateX(-100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  padding-top: env(safe-area-inset-top);
}
.sidebar.open { transform: translateX(0); }

.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 199;
  backdrop-filter: blur(2px);
}
.overlay.active { display: block; }

.sidebar-head {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
}

.user-card {
  display: flex; align-items: center; gap: 12px;
  padding: 12px;
  background: var(--surface2);
  border-radius: var(--r);
  margin-bottom: 12px;
}
.user-card img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
.user-card-info { flex: 1; min-width: 0; }
.user-card-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-card-email { font-family: var(--mono); font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.new-chat {
  width: 100%; padding: 10px;
  background: var(--accent); border: none; border-radius: var(--r);
  font-family: var(--font); font-size: 14px; font-weight: 600; color: white;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.2s;
}
.new-chat:hover { background: #5558e8; }

/* Provider/Model selector in sidebar */
.sidebar-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.section-title { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }

.provider-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
.ptab {
  flex: 1; padding: 7px 4px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.ptab.active { background: var(--accent); border-color: var(--accent); color: white; }
.ptab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

.model-list { display: flex; flex-direction: column; gap: 6px; }
.model-item {
  padding: 10px 12px; border-radius: var(--r);
  border: 1px solid var(--border); background: transparent;
  cursor: pointer; text-align: left; width: 100%;
  display: flex; align-items: center; gap: 10px;
  transition: all 0.15s;
}
.model-item:hover { border-color: var(--accent); background: rgba(99,102,241,0.06); }
.model-item.active { border-color: var(--accent); background: rgba(99,102,241,0.12); }
.model-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.model-item-name { font-size: 13px; font-weight: 500; }
.model-item-badge { font-family: var(--mono); font-size: 10px; color: var(--text3); }

/* API Key input */
.api-row { display: flex; gap: 8px; align-items: center; }
.api-inp {
  flex: 1; padding: 9px 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r); color: var(--text);
  font-family: var(--mono); font-size: 11px; outline: none;
  transition: border-color 0.2s;
}
.api-inp:focus { border-color: var(--accent); }
.api-inp::placeholder { color: var(--text3); }
.api-save {
  padding: 9px 12px; background: var(--accent); border: none;
  border-radius: var(--r); font-family: var(--mono); font-size: 11px;
  color: white; cursor: pointer; white-space: nowrap;
}

/* History */
.history-list { flex: 1; overflow-y: auto; padding: 8px; }
.history-list::-webkit-scrollbar { width: 3px; }
.history-list::-webkit-scrollbar-thumb { background: var(--border); }

.history-item {
  padding: 10px 12px; border-radius: var(--r);
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  margin-bottom: 2px; transition: background 0.15s;
}
.history-item:hover { background: var(--surface2); }
.history-item.active { background: rgba(99,102,241,0.1); }
.history-item-text { font-size: 13px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.history-del { opacity: 0; font-size: 16px; color: var(--text3); flex-shrink: 0; transition: opacity 0.15s; }
.history-item:hover .history-del { opacity: 1; }

.logout-btn {
  margin: 12px; padding: 10px;
  background: none; border: 1px solid var(--border);
  border-radius: var(--r); color: var(--text3);
  font-family: var(--mono); font-size: 12px;
  cursor: pointer; transition: all 0.2s;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* ═══════════════════════════════════════
   CHAT
═══════════════════════════════════════ */
.chat-wrap { flex: 1; overflow-y: auto; padding: 20px 16px; }
.chat-wrap::-webkit-scrollbar { width: 3px; }
.chat-wrap::-webkit-scrollbar-thumb { background: var(--border); }

/* Welcome */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 70vh;
  text-align: center; gap: 16px;
  animation: fadeUp 0.5s ease both;
}
.welcome-orb {
  width: 72px; height: 72px;
  background: conic-gradient(from 0deg, var(--accent), var(--green), var(--blue), var(--accent));
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  animation: orb-float 3s ease-in-out infinite, orb-hue 8s linear infinite;
  box-shadow: 0 0 60px var(--accent-glow);
}
.welcome h1 { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
.welcome h1 span { color: var(--green); }
.welcome p { font-family: var(--mono); font-size: 13px; color: var(--text3); max-width: 300px; line-height: 1.6; }

.chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
.chip {
  padding: 8px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  font-size: 13px; color: var(--text2); cursor: pointer;
  transition: all 0.2s;
}
.chip:hover { border-color: var(--accent); color: var(--text); background: var(--surface2); }

/* Messages */
.msg { margin-bottom: 16px; animation: fadeUp 0.25s ease both; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-row { display: flex; gap: 10px; align-items: flex-start; }
.msg-row.user { flex-direction: row-reverse; }

.av {
  width: 30px; height: 30px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0; overflow: hidden;
}
.av.agent { background: conic-gradient(from 0deg, var(--accent), var(--green)); animation: orb-hue 8s linear infinite; }
.av.user { background: var(--surface3); border: 1px solid var(--border2); }
.av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.bubble {
  max-width: min(520px, 82%);
  padding: 12px 16px;
  border-radius: var(--r2);
  font-size: 14px; line-height: 1.7;
}
.bubble.agent {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
}
.bubble.user {
  background: var(--accent);
  border-top-right-radius: 4px;
}
.bubble.user * { color: white !important; }

/* Markdown */
.bubble code {
  background: rgba(255,255,255,0.07);
  padding: 2px 6px; border-radius: 5px;
  font-family: var(--mono); font-size: 12px; color: var(--green);
}
.bubble pre {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px; overflow-x: auto;
  margin: 10px 0; font-family: var(--mono); font-size: 12px; line-height: 1.6;
}
.bubble pre code { background: none; padding: 0; color: var(--text); }
.bubble h1,.bubble h2,.bubble h3 { font-weight: 700; margin: 12px 0 6px; }
.bubble h1 { font-size: 18px; }
.bubble h2 { font-size: 16px; }
.bubble h3 { font-size: 14px; color: var(--accent); }
.bubble strong { color: var(--green); font-weight: 700; }
.bubble em { color: var(--text2); font-style: italic; }
.bubble p { margin-bottom: 8px; }
.bubble ul,.bubble ol { padding-left: 18px; margin-bottom: 8px; }
.bubble li { margin-bottom: 4px; }
.bubble a { color: var(--accent); }
.bubble table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
.bubble th { background: rgba(99,102,241,0.15); padding: 8px 12px; text-align: left; }
.bubble td { padding: 7px 12px; border-bottom: 1px solid var(--border); }
.bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text2); margin: 8px 0; }

.typing-ind {
  display: flex; align-items: center; gap: 4px;
  padding: 14px 18px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r2); border-top-left-radius: 4px;
  width: fit-content;
}
.td { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: td 1.2s infinite; }
.td:nth-child(2) { animation-delay: 0.2s; }
.td:nth-child(3) { animation-delay: 0.4s; }
@keyframes td { 0%,100%{transform:translateY(0);opacity:0.3} 50%{transform:translateY(-5px);opacity:1} }

/* ═══════════════════════════════════════
   INPUT
═══════════════════════════════════════ */
.input-area {
  flex-shrink: 0;
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
}

.input-box {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 10px 10px 10px 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-box:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.inp-ta {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font); font-size: 15px;
  line-height: 1.5; resize: none;
  min-height: 24px; max-height: 140px; overflow-y: auto;
}
.inp-ta::placeholder { color: var(--text3); }

.ibtn {
  width: 34px; height: 34px; border-radius: 10px;
  border: none; background: transparent; color: var(--text2);
  cursor: pointer; font-size: 18px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.ibtn:hover { background: var(--surface3); color: var(--text); }
.ibtn.rec { color: var(--red); background: rgba(244,63,94,0.1); animation: pulse-rec 1.5s infinite; }
@keyframes pulse-rec { 0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,0.3)} 50%{box-shadow:0 0 0 8px rgba(244,63,94,0)} }

.send-btn {
  width: 34px; height: 34px; border-radius: 10px;
  border: none; background: var(--accent); color: white;
  cursor: pointer; font-size: 16px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.send-btn:hover { background: #5558e8; transform: scale(1.05); }
.send-btn:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

.wake-row {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; margin-top: 8px;
  font-family: var(--mono); font-size: 11px; color: var(--text3);
}
.wake-btn {
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border); background: none;
  color: var(--text3); font-family: var(--mono); font-size: 11px;
  cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px;
}
.wake-btn:hover { border-color: var(--red); color: var(--red); }
.wake-btn.on { border-color: var(--red); color: var(--red); background: rgba(244,63,94,0.08); animation: pulse-rec 2s infinite; }

/* ═══════════════════════════════════════
   VOICE OVERLAY
═══════════════════════════════════════ */
#voiceOverlay {
  display: none; position: fixed; inset: 0;
  background: rgba(8,8,16,0.92);
  z-index: 500; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
  backdrop-filter: blur(8px);
}
#voiceOverlay.active { display: flex; }

.voice-ring {
  width: 120px; height: 120px; border-radius: 50%;
  background: conic-gradient(from 0deg, var(--red), var(--accent), var(--red));
  display: flex; align-items: center; justify-content: center;
  font-size: 44px;
  animation: orb-hue 2s linear infinite, voice-ring 0.8s ease-in-out infinite;
}
@keyframes voice-ring {
  0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244,63,94,0.4); }
  50% { transform: scale(1.06); box-shadow: 0 0 0 24px rgba(244,63,94,0); }
}
.voice-label { font-size: 18px; font-weight: 600; }
.voice-transcript { font-family: var(--mono); font-size: 14px; color: var(--green); min-height: 20px; text-align: center; max-width: 300px; }
.voice-stop {
  padding: 10px 28px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15); background: none;
  color: var(--text2); font-family: var(--mono); font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.voice-stop:hover { background: rgba(255,255,255,0.08); }

/* Toast */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--surface2); border: 1px solid var(--border2);
  padding: 10px 20px; border-radius: 20px;
  font-family: var(--mono); font-size: 13px;
  opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 600;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Error */
.err-msg { color: var(--red); font-family: var(--mono); font-size: 12px; margin-top: 6px; text-align: center; }

/* Stats badge in sidebar */
.stats-box {
  margin: 0 16px 8px;
  padding: 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r);
}
.stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.stat-label { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.stat-val { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--green); }

@media (min-width: 768px) {
  .sidebar { position: relative; transform: none !important; width: 280px; }
  .overlay { display: none !important; }
  #appScreen { flex-direction: row; }
  .main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .menu-btn { display: none; }
}
</style>
</head>
<body>

<!-- ═══ AUTH SCREEN ═══ -->
<div id="authScreen">
  <div class="auth-bg"></div>
  <div class="auth-hero">
    <div class="auth-orb">🤖</div>
    <div class="auth-title">Tinku</div>
    <div class="auth-tagline">Your AI Agent</div>
  </div>
  <div class="auth-sheet">
    <button class="btn-google" onclick="googleLogin()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="divider">or</div>
    <button class="btn-email" onclick="showEmailScreen('login')">📧 Sign in with Email</button>
    <button class="btn-email" onclick="showEmailScreen('signup')" style="background:transparent">✦ Create Account</button>
    <button class="btn-guest" onclick="guestLogin()">Continue as Guest →</button>
    <div class="err-msg" id="authError"></div>
  </div>
</div>

<!-- ═══ EMAIL SCREEN ═══ -->
<div id="emailScreen">
  <div class="email-card">
    <button class="back-btn" onclick="showAuth()">← Back</button>
    <h2 id="emailTitle">Sign In</h2>
    <p id="emailSub">Welcome back to Tinku</p>
    <input class="inp" id="nameInp" type="text" placeholder="Your name" style="display:none">
    <input class="inp" id="emailInp" type="email" placeholder="Email address">
    <input class="inp" id="passInp" type="password" placeholder="Password">
    <button class="btn-primary" onclick="submitEmailAuth()" id="emailSubmitBtn">Sign In</button>
    <div class="err-msg" id="emailError"></div>
    <div class="auth-toggle">
      <span id="emailToggleText" onclick="toggleEmailMode()">Don't have an account? Sign up</span>
    </div>
  </div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="appScreen">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="user-card">
        <img id="sidebarPhoto" src="" alt="User">
        <div class="user-card-info">
          <div class="user-card-name" id="sidebarName">User</div>
          <div class="user-card-email" id="sidebarEmail">guest</div>
        </div>
      </div>
      <button class="new-chat" onclick="newChat()">✦ New Chat</button>
    </div>

    <!-- Provider -->
    <div class="sidebar-section">
      <div class="section-title">AI Provider</div>
      <div class="provider-tabs">
        <button class="ptab active" data-provider="gemini" onclick="selectProvider(this)">Gemini</button>
        <button class="ptab" data-provider="groq" onclick="selectProvider(this)">Groq</button>
        <button class="ptab" data-provider="claude" onclick="selectProvider(this)">Claude</button>

    <!-- Stats -->
    <div class="stats-box" id="statsBox" style="display:none">
      <div class="section-title" style="margin-bottom:8px">Your Usage</div>
      <div class="stat-row"><span class="stat-label">Total messages</span><span class="stat-val" id="statTotal">0</span></div>
      <div class="stat-row"><span class="stat-label">Favourite provider</span><span class="stat-val" id="statProvider">—</span></div>

    <!-- History -->
    <div class="history-list" id="historyList"></div>

    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- MAIN AREA -->
  <div class="main-area" style="flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden">

    <!-- TOPBAR -->
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="topbar-center">
        <span class="topbar-name">Tinku 🤖</span>
        <span class="provider-badge" id="providerBadge">Gemini</span>
      </div>
      <img class="user-avatar" id="topbarAvatar" src="" alt="User" onclick="toggleSidebar()">

    <!-- CHAT -->

    <!-- INPUT -->

      <div class="input-box">
        <textarea class="inp-ta" id="msgInp"
          placeholder="Ask Tinku anything..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoH(this)"></textarea>
        <button class="ibtn" id="micBtn" onclick="startVoice()" title="Voice input">🎤</button>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
      </div>
      <div class="wake-row">
        <span>Say</span>
        <button class="wake-btn" id="wakeBtn" onclick="toggleWake()">🎙 Hey Tinku</button>
        <span>to activate</span>

</div>

<!-- VOICE OVERLAY -->
<div id="voiceOverlay">
  <div class="voice-ring">🎤</div>
  <div class="voice-label" id="voiceLabel">Listening...</div>
  <div class="voice-transcript" id="voiceTx"></div>
  <button class="voice-stop" onclick="stopVoice()">✕ Cancel</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let currentUser = null;
let token = null;
let currentProvider = 'gemini';
let currentModel = 'gemini-2.0-flash';
let currentConvId = null;
let history = [];
let isLoading = false;
let emailMode = 'login';
let recognition = null;
let wakeRec = null;
let wakeOn = false;

const PROVIDERS = {
  gemini: {
    color: '#4285F4',
    models: [
      {id:'gemini-2.0-flash', name:'Gemini 2.0 Flash', badge:'Recommended • Free'},
      {id:'gemini-1.5-pro', name:'Gemini 1.5 Pro', badge:'Most Capable • Free'},
      {id:'gemini-1.5-flash', name:'Gemini 1.5 Flash', badge:'Fastest • Free'},
    ]
  },
  groq: {
    color: '#F55036',
    models: [
      {id:'llama-3.3-70b-versatile', name:'Llama 3.3 70B', badge:'Fast • Free'},
      {id:'mixtral-8x7b-32768', name:'Mixtral 8x7B', badge:'Free'},
      {id:'gemma2-9b-it', name:'Gemma 2 9B', badge:'Lightweight • Free'},
    ]
  },
  claude: {
    color: '#D97706',
    models: [
      {id:'claude-sonnet-4-5', name:'Claude Sonnet 4.5', badge:'Recommended'},
      {id:'claude-opus-4-5', name:'Claude Opus 4.5', badge:'Most Powerful'},
      {id:'claude-haiku-4-5', name:'Claude Haiku 4.5', badge:'Fastest'},
    ]
  }
};

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
window.onload = () => {
  token = localStorage.getItem('tinku_token');
  const savedUser = localStorage.getItem('tinku_user');
  if (token && savedUser) {
    currentUser = JSON.parse(savedUser);
    enterApp();
  }
  renderModels();
  loadApiKey();
};

// ════════════════════════════════════════
// AUTH
// ════════════════════════════════════════
function showAuth() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('emailScreen').style.display = 'none';
}

function showEmailScreen(mode) {
  emailMode = mode;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('emailScreen').style.display = 'flex';
  document.getElementById('emailTitle').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('emailSub').textContent = mode === 'login' ? 'Welcome back to Tinku' : 'Join Tinku today';
  document.getElementById('emailSubmitBtn').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('nameInp').style.display = mode === 'signup' ? 'block' : 'none';
  document.getElementById('emailToggleText').textContent = mode === 'login'
    ? "Don't have an account? Sign up"
    : 'Already have an account? Sign in';
}

function toggleEmailMode() {
  showEmailScreen(emailMode === 'login' ? 'signup' : 'login');
}

async function submitEmailAuth() {
  const email = document.getElementById('emailInp').value.trim();
  const pass = document.getElementById('passInp').value;
  const name = document.getElementById('nameInp').value.trim();
  const errEl = document.getElementById('emailError');
  errEl.textContent = '';

  if (!email || !pass) { errEl.textContent = 'Please fill all fields'; return; }
  if (emailMode === 'signup' && !name) { errEl.textContent = 'Please enter your name'; return; }

  const endpoint = emailMode === 'login' ? '/api/auth/login' : '/api/auth/signup';
  const body = emailMode === 'login' ? {email, password: pass} : {name, email, password: pass};

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Auth failed');
    setSession(data.token, data.user);
    enterApp();
  } catch(e) {
    errEl.textContent = e.message;
  }
}

async function googleLogin() {
  // For demo — show instruction since we need Google Client ID configured
  showToast('⚙️ Configure GOOGLE_CLIENT_ID in your Render env vars first!');
  // In production with Client ID:
  // google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleCredential });
  // google.accounts.id.prompt();
}

async function guestLogin() {
  const res = await fetch('/api/auth/guest');
  const data = await res.json();
  setSession(data.token, data.user);
  enterApp();
}

function setSession(t, user) {
  token = t;
  currentUser = user;
  localStorage.setItem('tinku_token', t);
  localStorage.setItem('tinku_user', JSON.stringify(user));
}

function logout() {
  token = null; currentUser = null; history = []; currentConvId = null;
  localStorage.removeItem('tinku_token');
  localStorage.removeItem('tinku_user');
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
}

// ════════════════════════════════════════
// APP ENTRY
// ════════════════════════════════════════
function enterApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('emailScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';

  // Update UI with user info
  const photo = currentUser.photo || `https://ui-avatars.com/api/?name=${currentUser.name}&background=6366f1&color=fff`;
  document.getElementById('sidebarPhoto').src = photo;
  document.getElementById('topbarAvatar').src = photo;
  document.getElementById('sidebarName').textContent = currentUser.name;
  document.getElementById('sidebarEmail').textContent = currentUser.email || 'Guest';

  showWelcome();
  loadHistory();
  loadStats();
}

// ════════════════════════════════════════
// PROVIDER & MODEL
// ════════════════════════════════════════
function selectProvider(btn) {
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentProvider = btn.dataset.provider;
  currentModel = PROVIDERS[currentProvider].models[0].id;
  renderModels();
  document.getElementById('providerBadge').textContent = {
    gemini:'Gemini', groq:'Groq', claude:'Claude'
  }[currentProvider];
  loadApiKey();
}

function renderModels() {
  const list = document.getElementById('modelList');
  list.innerHTML = '';
  PROVIDERS[currentProvider].models.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'model-item' + (m.id === currentModel ? ' active' : '');
    btn.innerHTML = `
      <div class="model-dot" style="background:${PROVIDERS[currentProvider].color}"></div>
      <div>
        <div class="model-item-name">${m.name}</div>
        <div class="model-item-badge">${m.badge}</div>
      </div>`;
    btn.onclick = () => {
      document.querySelectorAll('.model-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentModel = m.id;
      showToast(`Model: ${m.name}`);
    };
    list.appendChild(btn);
  });
}

// ════════════════════════════════════════
// API KEY
// ════════════════════════════════════════
function saveApiKey() {
  const key = document.getElementById('apiKeyInp').value.trim();
  if (!key) { showToast('⚠️ Enter an API key first'); return; }
  localStorage.setItem(`tinku_key_${currentProvider}`, key);
  showToast(`✅ ${currentProvider} API key saved!`);
}

function loadApiKey() {
  const key = localStorage.getItem(`tinku_key_${currentProvider}`) || '';
  document.getElementById('apiKeyInp').value = key;
}

function getApiKey() {
  return localStorage.getItem(`tinku_key_${currentProvider}`) || '';
}

// ════════════════════════════════════════
// CHAT
// ════════════════════════════════════════
function showWelcome() {
  const chat = document.getElementById('chatWrap');
  chat.innerHTML = `
    <div class="welcome">
      <div class="welcome-orb">🤖</div>
      <h1>Hey, I'm <span>Tinku</span>!</h1>
      <p>Your AI agent. Ask me anything — I'll search, calculate, code, predict, and more.</p>
      <div class="chips">
        <div class="chip" onclick="useChip(this)">🌤 Weather in Mumbai</div>
        <div class="chip" onclick="useChip(this)">💻 Write Python code</div>
        <div class="chip" onclick="useChip(this)">🔮 Future of AI</div>
        <div class="chip" onclick="useChip(this)">🧮 Calculate compound interest</div>
        <div class="chip" onclick="useChip(this)">🔍 Latest tech news</div>
        <div class="chip" onclick="useChip(this)">🧠 Mind map: Startup ideas</div>
      </div>
    </div>`;
}

function newChat() {
  history = []; currentConvId = null;
  showWelcome();
  closeSidebar();
}

function useChip(el) {
  document.getElementById('msgInp').value = el.textContent.slice(2);
  sendMsg();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function autoH(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

async function sendMsg() {
  const inp = document.getElementById('msgInp');
  const msg = inp.value.trim();
  if (!msg || isLoading) return;

  const apiKey = getApiKey();
  if (!apiKey) {
    showToast('⚠️ Add your API key in the sidebar first!');
    document.getElementById('apiKeyInp').focus();
    return;
  }

  // Clear welcome
  document.querySelector('.welcome')?.remove();
  inp.value = ''; inp.style.height = 'auto';

  appendMsg('user', msg);
  history.push({role:'user', content:msg});

  const typing = addTyping();
  setLoading(true);

  try {
    const res = await fetch('/api/chat/send', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token || 'guest'}`
      },
      body: JSON.stringify({
        message: msg,
        history: history.slice(0,-1),
        provider: currentProvider,
        model: currentModel,
        api_key: apiKey,
        conversation_id: currentConvId,
      })
    });

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let full = '';

    while(true) {
      const {done, value} = await reader.read();
      if(done) break;
      const lines = dec.decode(value).split('\n');
      for(const line of lines) {
        if(!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          if(evt.type === 'chunk') full += evt.text;
          else if(evt.type === 'done') {
            if(evt.conversation_id) currentConvId = evt.conversation_id;
          }
          else if(evt.type === 'error') throw new Error(evt.text);
        } catch(e) {}
      }
    }

    typing.remove();
    appendMsg('agent', full);
    history.push({role:'assistant', content:full});
    loadHistory();

  } catch(e) {
    typing.remove();
    appendMsg('agent', `❌ **Error:** ${e.message}\n\nPlease check your API key and try again.`);
  }

  setLoading(false);
}

function appendMsg(role, text) {
  const wrap = document.getElementById('chatWrap');
  const isAgent = role === 'agent';
  const photo = currentUser?.photo || '';

  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `
    <div class="msg-row ${role}">
      <div class="av ${isAgent ? 'agent' : 'user'}">
        ${isAgent ? '🤖' : (photo ? `<img src="${photo}" alt="">` : '👤')}
      </div>
      <div class="bubble ${isAgent ? 'agent' : 'user'}">${isAgent ? renderMD(text) : esc(text)}</div>
    </div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function addTyping() {
  const wrap = document.getElementById('chatWrap');
  const div = document.createElement('div');
  div.className = 'msg'; div.id = 'typing';
  div.innerHTML = `<div class="msg-row agent"><div class="av agent">🤖</div><div class="typing-ind"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function setLoading(v) {
  isLoading = v;
  document.getElementById('sendBtn').disabled = v;
}

// ════════════════════════════════════════
// HISTORY
// ════════════════════════════════════════
async function loadHistory() {
  if(!currentUser || currentUser.id === 'guest') return;
  try {
    const res = await fetch('/api/chat/conversations', {
      headers: {'Authorization': `Bearer ${token}`}
    });
    const data = await res.json();
    renderHistory(data.conversations || []);
  } catch(e) {}
}

function renderHistory(convos) {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  if(!convos.length) {
    list.innerHTML = '<div style="padding:12px;font-family:var(--mono);font-size:12px;color:var(--text3)">No history yet</div>';
    return;
  }
  convos.forEach(c => {
    const item = document.createElement('div');
    item.className = 'history-item' + (c.id === currentConvId ? ' active' : '');
    item.innerHTML = `
      <span style="font-size:14px">💬</span>
      <span class="history-item-text">${esc(c.title)}</span>
      <span class="history-del" onclick="deleteConvo(event,'${c.id}')">✕</span>`;
    item.onclick = () => loadConvo(c.id);
    list.appendChild(item);
  });
}

async function loadConvo(convId) {
  currentConvId = convId;
  const chat = document.getElementById('chatWrap');
  chat.innerHTML = '';
  history = [];
  try {
    const res = await fetch(`/api/chat/conversations/${convId}/messages`, {
      headers: {'Authorization': `Bearer ${token}`}
    });
    const data = await res.json();
    data.messages.forEach(m => {
      appendMsg(m.role, m.content);
      history.push({role: m.role, content: m.content});
    });
  } catch(e) {}
  closeSidebar();
}

async function deleteConvo(e, convId) {
  e.stopPropagation();
  await fetch(`/api/chat/conversations/${convId}`, {
    method: 'DELETE',
    headers: {'Authorization': `Bearer ${token}`}
  });
  if(convId === currentConvId) newChat();
  loadHistory();
}

// ════════════════════════════════════════
// STATS
// ════════════════════════════════════════
async function loadStats() {
  if(!currentUser || currentUser.id === 'guest') return;
  try {
    const res = await fetch('/api/users/stats', {headers: {'Authorization': `Bearer ${token}`}});
    const data = await res.json();
    if(data.stats) {
      document.getElementById('statsBox').style.display = 'block';
      document.getElementById('statTotal').textContent = data.stats.total_messages || 0;
      const byProvider = data.stats.messages_by_provider || {};
      const top = Object.entries(byProvider).sort((a,b)=>b[1]-a[1])[0];
      document.getElementById('statProvider').textContent = top ? top[0] : '—';
    }
  } catch(e) {}
}

// ════════════════════════════════════════
// SIDEBAR
// ════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('active');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
}

// ════════════════════════════════════════
// VOICE
// ════════════════════════════════════════
function startVoice() {
  if(!('SpeechRecognition' in window) && !('webkitSpeechRecognition' in window)) {
    showToast('⚠️ Voice not supported. Use Chrome.'); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  document.getElementById('voiceOverlay').classList.add('active');
  document.getElementById('voiceLabel').textContent = 'Listening...';
  document.getElementById('voiceTx').textContent = '';
  document.getElementById('micBtn').classList.add('rec');

  recognition.onresult = e => {
    const tx = Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('voiceTx').textContent = tx;
    if(e.results[e.results.length-1].isFinal) {
      document.getElementById('msgInp').value = tx;
      autoH(document.getElementById('msgInp'));
      stopVoice();
      setTimeout(() => sendMsg(), 400);
    }
  };
  recognition.onerror = () => stopVoice();
  recognition.onend = () => { if(document.getElementById('voiceOverlay').classList.contains('active')) stopVoice(); };
  recognition.start();
}

function stopVoice() {
  document.getElementById('voiceOverlay').classList.remove('active');
  document.getElementById('micBtn').classList.remove('rec');
  try { recognition?.stop(); } catch(e) {}
  recognition = null;
}

function toggleWake() {
  wakeOn ? stopWake() : startWake();
}

function startWake() {
  if(!('SpeechRecognition' in window) && !('webkitSpeechRecognition' in window)) {
    showToast('⚠️ Voice not supported. Use Chrome.'); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  wakeRec = new SR();
  wakeRec.continuous = true;
  wakeRec.interimResults = true;
  wakeRec.lang = 'en-US';
  wakeOn = true;
  document.getElementById('wakeBtn').classList.add('on');
  document.getElementById('wakeBtn').textContent = '🎙 Listening...';
  showToast('👂 Say "Hey Tinku" anytime!');

  wakeRec.onresult = e => {
    const tx = Array.from(e.results).map(r=>r[0].transcript.toLowerCase()).join(' ');
    if(tx.includes('hey tinku') || tx.includes('hi tinku') || tx.includes('ok tinku')) {
      stopWake();
      showToast('🤖 Yes? I\'m listening!');
      setTimeout(() => startVoice(), 500);
    }
  };
  wakeRec.onerror = () => stopWake();
  wakeRec.onend = () => { if(wakeOn) { try { wakeRec.start(); } catch(e) { stopWake(); } } };
  try { wakeRec.start(); } catch(e) { stopWake(); }
}

function stopWake() {
  wakeOn = false;
  document.getElementById('wakeBtn').classList.remove('on');
  document.getElementById('wakeBtn').textContent = '🎙 Hey Tinku';
  try { wakeRec?.stop(); } catch(e) {}
  wakeRec = null;
}

// ════════════════════════════════════════
// MARKDOWN
// ════════════════════════════════════════
function renderMD(text) {
  if(!text) return '';
  let h = esc(text);
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_,l,c) => `<pre><code>${c.trimEnd()}</code></pre>`);
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  h = h.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  h = h.replace(/\n\n/g, '</p><p>');
  h = h.replace(/\n/g, '<br>');
  return `<p>${h}</p>`;
}

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════
// TOAST
// ════════════════════════════════════════
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
